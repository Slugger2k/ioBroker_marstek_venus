<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="../../css/adapter.css">
</head>
<body>

<div style="padding:10px">
    <h3>Marstek Venus Configuration</h3>
    
    <table>
        <tr>
            <td>IP Address:</td>
            <td><input type="text" id="ip"></td>
        </tr>
        <tr>
            <td>UDP Port:</td>
            <td><input type="number" id="port" value="30000"></td>
        </tr>
    </table>

    <button onclick="save()">Save</button>

</div>

<script>
function load(settings) {
    document.getElementById('ip').value = settings.ipAddress || '';
    document.getElementById('port').value = settings.udpPort || 30000;
}

function save(callback) {
    callback({
        ipAddress: document.getElementById('ip').value,
        udpPort: parseInt(document.getElementById('port').value),
        pollInterval: 1000,
        autoDiscovery: true
    });
}
</script>

</body>
</html>
